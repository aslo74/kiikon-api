<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Téléchargement de Bluffr AI</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 20px;
    }
    .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 15px;
      opacity: 0.7;
      margin-bottom: 32px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #5BA8C8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fallback {
      display: none;
      margin-top: 24px;
    }
    .fallback a {
      display: inline-block;
      margin: 8px;
      padding: 12px 24px;
      background: #5BA8C8;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <div class="title">BLUFFR AI</div>
    <div class="subtitle">Redirection vers le store...</div>
    <div class="fallback" id="fallback">
      <p>La redirection n'a pas fonctionné ?</p>
      <a href="https://apps.apple.com/app/id6760307070">App Store</a>
      <a href="https://play.google.com/store/apps/details?id=fr.cubith.bluffr">Google Play</a>
    </div>
  </div>

  <script>
    (function() {
      var APP_STORE_URL   = "https://apps.apple.com/app/id6760307070";
      var GOOGLE_PLAY_URL = "https://play.google.com/store/apps/details?id=fr.cubith.bluffr";

      var ua = navigator.userAgent || navigator.vendor || window.opera;

      // iOS (iPhone, iPad, iPod)
      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

      // Android
      var isAndroid = /android/i.test(ua);

      var target = null;
      if (isIOS) {
        target = APP_STORE_URL;
      } else if (isAndroid) {
        target = GOOGLE_PLAY_URL;
      }

      if (target) {
        window.location.replace(target);
      } else {
        // Desktop / OS non détecté : afficher les 2 boutons
        document.getElementById("fallback").style.display = "block";
        document.querySelector(".subtitle").textContent = "Choisissez votre plateforme :";
      }
    })();
  </script>
</body>
</html>
